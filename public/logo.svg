<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <rect width="400" height="400" fill="#0F0F0F"/>

  <!-- Bar chart icon -->
  <g transform="translate(120, 145)">
    <rect x="0" y="40" width="16" height="50" rx="2" fill="#E8B931"/>
    <rect x="22" y="20" width="16" height="70" rx="2" fill="#E8B931"/>
    <rect x="44" y="0" width="16" height="90" rx="2" fill="#E8B931"/>
    <rect x="66" y="30" width="16" height="60" rx="2" fill="#E8B931"/>
    <rect x="88" y="50" width="16" height="40" rx="2" fill="#E8B931"/>
  </g>

  <!-- THE HUMOR INDEX text -->
  <text x="200" y="280" text-anchor="middle" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-weight="500" font-size="28" letter-spacing="6" fill="#FFFFFF">THE</text>
  <text x="200" y="315" text-anchor="middle" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-weight="600" font-size="32" letter-spacing="4" fill="#FFFFFF">HUMOR</text>
  <text x="200" y="350" text-anchor="middle" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-weight="500" font-size="28" letter-spacing="6" fill="#FFFFFF">INDEX</text>
</svg>
